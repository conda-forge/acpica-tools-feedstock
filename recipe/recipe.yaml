# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: "20260408"

package:
  name: acpica-tools
  version: ${{ version }}

source:
  url: https://github.com/acpica/acpica/archive/refs/tags/${{ version }}.tar.gz
  sha256: ddc5d3e0f54030e2348484fff681861a161efb4e388e20631209574e7884ad39
  patches:
    - patches/0001-fix-mingw64-vsnprintf-conflict.patch

build:
  number: 0
  script:
    - if: not win
      then: |
        make PREFIX="${PREFIX}" OPT_CFLAGS="-DACPI_PACKED_POINTERS_NOT_SUPPORTED"
        make PREFIX="${PREFIX}" INSTALL="${BUILD_PREFIX}/bin/install" INSTALLFLAGS="-c --strip-program=${STRIP} -m 555 -s" install
      else: |
        set MSYSTEM=MINGW64
        set "UNIX_PREFIX=%LIBRARY_PREFIX:\=/%"
        set MAKE_FLAGS=HOST=_MinGW NOWERROR=TRUE PROGS="acpibin acpihelp acpixtract iasl" OPT_CFLAGS="-DACPI_PACKED_POINTERS_NOT_SUPPORTED"
        make PREFIX="%UNIX_PREFIX%" %MAKE_FLAGS%
        if errorlevel 1 exit /b 1
        make PREFIX="%UNIX_PREFIX%" %MAKE_FLAGS% install
        if errorlevel 1 exit /b 1
        for %%p in (acpibin acpihelp acpixtract iasl) do copy /y "%LIBRARY_PREFIX%\bin\%%p" "%LIBRARY_PREFIX%\bin\%%p.exe"
        if errorlevel 1 exit /b 1
requirements:
  build:
    - if: not win
      then:
        - make
        - coreutils
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - bison
        - flex
        - m4
      else:
        - m2-make
        - m2-coreutils
        - m2w64-gcc
        - m2-bison
        - m2-flex
        - m2-m4
tests:
  - script:
      - if: not win
        then: acpihelp -u
        else: acpihelp.exe -u
about:
  license: Intel-ACPI OR GPL-2.0-only
  license_file: LICENSE
  summary: OS-independent implementation of the ACPI specification
  description: |
    ACPICA (ACPI Component Architecture) project provides an OS-independent
    reference implementation of the Advanced Configuration and Power Interface
    Specification (ACPI).
  homepage: https://www.acpica.org/
  repository: https://github.com/acpica/acpica
  documentation: https://www.acpica.org/

extra:
  recipe-maintainers:
    - hameerabbasi
